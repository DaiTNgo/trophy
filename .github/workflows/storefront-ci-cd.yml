name: Storefront CI/CD

on:
  pull_request:
    paths:
      - "apps/storefront/**"
      - "packages/customization/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/storefront-ci-cd.yml"
  push:
    branches:
      - main
    paths:
      - "apps/storefront/**"
      - "packages/customization/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/storefront-ci-cd.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: storefront-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Storefront checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify customization package
        run: pnpm --filter customization test && pnpm --filter customization check

      - name: Verify storefront
        run: pnpm --filter router-cf typecheck && pnpm --filter router-cf build
        env:
          VITE_BACKEND_URL: ${{ secrets.STOREFRONT_BACKEND_URL }}

  preview:
    name: Storefront preview deploy
    if: github.event_name == 'pull_request'
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build storefront for preview upload
        run: pnpm --filter router-cf build
        env:
          VITE_BACKEND_URL: ${{ secrets.STOREFRONT_BACKEND_URL }}

      - name: Upload preview version
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          packageManager: pnpm
          workingDirectory: apps/storefront
          command: versions upload --preview-alias pr-${{ github.event.pull_request.number }}
        env:
          VITE_BACKEND_URL: ${{ secrets.STOREFRONT_BACKEND_URL }}

      - name: Capture preview URL
        id: preview-url
        env:
          DEPLOYMENT_URL: ${{ steps.preview.outputs.deployment-url }}
          COMMAND_OUTPUT: ${{ steps.preview.outputs.command-output }}
        run: |
          url="$DEPLOYMENT_URL"
          if [ -z "$url" ]; then
            url="$(printf '%s\n' "$COMMAND_OUTPUT" | grep -Eo 'https://[^[:space:]]+' | head -n 1)"
          fi
          if [ -z "$url" ]; then
            echo "Could not determine preview URL from Wrangler output." >&2
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.preview-url.outputs.url }}
        with:
          script: |
            const marker = '<!-- storefront-preview-url -->';
            const body = [
              marker,
              `Storefront preview deployed: ${process.env.PREVIEW_URL}`,
              '',
              `Alias: \`pr-${context.issue.number}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  deploy:
    name: Storefront production deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build storefront for production deploy
        run: pnpm --filter router-cf build
        env:
          VITE_BACKEND_URL: ${{ secrets.STOREFRONT_BACKEND_URL }}

      - name: Deploy storefront to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          packageManager: pnpm
          workingDirectory: apps/storefront
          command: deploy
        env:
          VITE_BACKEND_URL: ${{ secrets.STOREFRONT_BACKEND_URL }}
